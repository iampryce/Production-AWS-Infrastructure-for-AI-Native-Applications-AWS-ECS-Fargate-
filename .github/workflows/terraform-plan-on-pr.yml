name: Terraform Plan (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.list.outputs.environments }}
    steps:
      - uses: actions/checkout@v4

      # Discovers environments dynamically (dev today, staging/prod later)
      # so this workflow never needs editing when a new environment is added.
      - id: list
        run: |
          envs=$(find terraform/environments -mindepth 1 -maxdepth 1 -type d \
            -exec test -f '{}/main.tf' \; -print \
            | xargs -n1 basename | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "environments=$envs" >> "$GITHUB_OUTPUT"

  plan:
    needs: discover
    if: needs.discover.outputs.environments != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJson(needs.discover.outputs.environments) }}
    permissions:
      id-token: write # required for OIDC
      contents: read
      pull-requests: write # to comment the plan on the PR
    steps:
      - uses: actions/checkout@v4

      # Read-only role, assumable from any branch/PR — this job can never
      # mutate real infrastructure even if the workflow itself were broken
      # or malicious on a fork/branch.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_PLAN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - name: Terraform Init
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform plan -input=false -no-color
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `#### Terraform Plan — \`${{ matrix.environment }}\` (${{ steps.plan.outcome }})
            <details><summary>Show plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            ${{ steps.plan.outputs.stderr }}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail the job if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
