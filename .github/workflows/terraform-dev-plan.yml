name: Terraform Plan (dev)

# One workflow per environment, on purpose — no dynamic discovery/matrix.
# When staging/prod exist, copy this file and swap "dev" for that
# environment's name and paths.

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/modules/**"
      - "terraform/environments/dev/**"

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC
      contents: read
      pull-requests: write # to comment the plan on the PR
    steps:
      - uses: actions/checkout@v4

      # Read-only role — this job can never mutate real infrastructure.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_PLAN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        working-directory: terraform/environments/dev
        run: terraform plan -input=false -no-color
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `#### Terraform Plan — \`dev\` (${{ steps.plan.outcome }})
            <details><summary>Show plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            ${{ steps.plan.outputs.stderr }}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail the job if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
