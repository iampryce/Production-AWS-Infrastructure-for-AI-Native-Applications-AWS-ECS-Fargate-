name: Terraform (dev)
on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/modules/**"
      - "terraform/environments/dev/**"
  push:
    branches: [main]
    paths:
      - "terraform/modules/**"
      - "terraform/environments/dev/**"

permissions:
  contents: read

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Read-only role — this job can never mutate real infrastructure.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_PLAN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: terraform/environments/dev
        env:
          # Cloudflare provider - reads this env var itself, same pattern
          # as AWS credentials above. Scoped token: Account > Cloudflare
          # Tunnel > Edit, nothing broader.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # -refresh=false deliberately: a full refresh re-reads every
        # Secrets Manager secret VERSION's actual content (RDS/Redis/
        # Cloudflare tunnel token), which needs secretsmanager:GetSecretValue
        # - a permission ReadOnlyAccess excludes on purpose, and one this
        # role must never have, since it's assumable from any branch/PR
        # (ADR-003). Granting it would let any PR read live production
        # secrets, a bigger hole than "read-only" was meant to close. This
        # plan diffs config against the last-known state from the most
        # recent apply instead of live AWS state - a deliberate tradeoff,
        # not an oversight (see ADR-003).
        run: terraform plan -input=false -no-color -refresh=false

  apply:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # Add required reviewers on the "dev" GitHub Environment (repo Settings)
    # for an extra manual approval gate on top of "merge to main" itself.
    environment: dev
    permissions:
      id-token: write # required for OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Read-write role — only assumable from main, enforced by the OIDC
      # trust condition in terraform/bootstrap, not just this trigger.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_APPLY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: terraform/environments/dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        env:
          # Needed again here - a saved plan file doesn't carry provider
          # credentials with it, apply re-authenticates independently.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # Applies the exact plan just generated in this job, not a fresh
        # plan re-evaluated at apply time.
        run: terraform apply -input=false tfplan
